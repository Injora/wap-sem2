<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bleach Battle Arena</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main_box">
        <div id="head" style="position: relative;">
            <h1>Bleach Battle Arena ⚔️</h1>
            <p>Assemble your team of 3 characters and battle!</p>
        </div>
        <div id="top_menu">
            <div class="search_div">
                <input type="text" id="find_input" placeholder="Search character by name...">
            </div>
            <div class="filters">
                <select id="race_drop">
                    <option value="all">All Races</option>
                    <option value="Soul Reaper">Soul Reaper</option>
                    <option value="Hollow">Hollow</option>
                    <option value="Arrancar">Arrancar</option>
                    <option value="Quincy">Quincy</option>
                    <option value="Human">Human</option>
                </select>
                <select id="gender">
                    <option value="all">All Genders</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="sort">
                <select id="bp_sort">
                    <option value="default">Sort by BP</option>
                    <option value="asc">Lowest to Highest BP</option>
                    <option value="desc">Highest to Lowest BP</option>
                </select>
            </div>
        </div>

        <div id="bottom_part">
            <div id="left_col">
                <h2>Character Roster</h2>
                <div id="chars_grid" class="cards_area">
                    <p class="loading">Loading characters...</p>
                </div>
            </div>
            <div id="right_col">
                <div id="team_sec">
                    <h2 style="text-align: center; margin-top: 0;">2-Player Draft</h2>
                    <div style="display:flex; justify-content: space-between; gap: 15px;">
                        <div id="p1_panel" class="player-panel"
                            style="flex:1; border: 2px solid #4CAF50; padding: 10px; border-radius: 8px; cursor: pointer;">
                            <h3 style="margin-top:0; text-align:center; color: #4CAF50;">P1 (<span
                                    id="t1_count">0</span>/3)</h3>
                            <div id="chosen_chars_p1" class="chosen-grid"
                                style="min-height: 100px; display: flex; flex-direction: column; gap: 5px;"></div>
                            <button id="rand_p1_btn"
                                style="width:100%; margin-top: 10px; background: #3c823f; font-size:12px; padding: 5px;">🎲
                                Random P1</button>
                            <button id="undo_p1_btn"
                                style="width:100%; margin-top: 5px; background:#777; font-size:12px; padding:5px;">
                                ↩️ Undo Last
                            </button>

                        </div>

                        <div id="p2_panel" class="player-panel"
                            style="flex:1; border: 2px solid #333; padding: 10px; border-radius: 8px; cursor: pointer;">
                            <h3 style="margin-top:0; text-align:center; color: #ff5555;">P2 (<span
                                    id="t2_count">0</span>/3)</h3>
                            <div id="chosen_chars_p2" class="chosen-grid"
                                style="min-height: 100px; display: flex; flex-direction: column; gap: 5px;"></div>
                            <button id="rand_p2_btn"
                                style="width:100%; margin-top: 10px; background: #a83d3d; font-size:12px; padding: 5px;">🎲
                                Random P2</button>
                            <button id="undo_p2_btn"
                                style="width:100%; margin-top: 5px; background:#777; font-size:12px; padding:5px;">
                                ↩️ Undo Last
                            </button>

                        </div>
                    </div>

                    <div style="margin-top: 15px; display:flex; gap: 10px;">
                        <button id="reset_teams_btn" style="background:#555; flex:1;">Reset</button>
                        <button id="btn1" style="flex:2;" disabled>Start Local Battle</button>
                    </div>
                </div>
                <div id="fight_sec" class="hide">
                    <h2>🗡️ Battle Log 🗡️</h2>
                    <div id="log_box">
                    </div>
                    <div id="result_text"></div>
                    <button id="btn2" class="hide">Play Again</button>
                </div>
            </div>
        </div>

    </div>

    <div id="char_modal" class="modal-hide">
        <div class="modal-content" id="modal_content_box">
            <span id="close_modal_btn">&times;</span>
            <div id="modal_inner"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
